<!--
  ====================================================================
  push-panel WordPress install snippet (LaraPush-style soft prompt)
  ====================================================================

  HOW TO INSTALL ON A NEW WORDPRESS WEBSITE
  ------------------------------------------

  STEP 1 — Add the new site as a Domain in the push-panel dashboard
    1. Open  https://push.tradewithcandle.com/dashboard/domains
    2. Click "Add a domain"
    3. Label = your brand name (e.g. "CelebTalksDaily")
       Site origin = the site URL (e.g. "https://celebtalksdaily.com")
    4. Click Add — the new domain page will show its OWN VAPID public key.
       Copy that key (you'll paste it into this file in Step 3).

  STEP 2 — Upload sw.js to the root of the new website
    1. Open  https://push.tradewithcandle.com/sw.js  in your browser
    2. Right-click → Save As → save it as "sw.js"
    3. Open the site's File Manager → public_html folder
       (the folder that contains wp-config.php)
    4. Upload sw.js into public_html (NOT inside any subfolder)
    5. Verify: open  https://yoursite.com/sw.js  in browser → must
       show JavaScript code starting with  /* push-panel service worker */

  STEP 3 — Add this snippet to WordPress
    1. Plugins → Add New → install/activate "WPCode" plugin
    2. Code Snippets → Header & Footer → paste this whole file into the
       FOOTER box
    3. CHANGE THE TWO VALUES below marked with !!!CHANGE!!!:
         • SITE_NAME — the brand name shown in the popup headline
         • VAPID     — the public key copied from Step 1 (must match
                       THIS site's key, not another site's!)
    4. Save Changes

  STEP 4 — Clear ALL caches
    1. WordPress cache plugin (LiteSpeed Cache / WP Rocket / etc.)
       → Purge All
    2. Hostinger Cache Manager → Purge All
    3. Cloudflare (if used) → Purge Everything

  STEP 5 — Test
    Open https://yoursite.com in an INCOGNITO/PRIVATE window. Within ~1.2s
    the popup should appear (top-center on desktop, bottom-center on mobile).
    Click Allow → real browser permission box appears → subscribed.
    Verify in panel: Dashboard → Domains → click your site → count goes 0→1.

  COMMON MISTAKES
  ---------------
  • Pasting the whole install snippet HTML inside the VAPID = "..." value
    instead of just the bare key — breaks the script.
  • Reusing a VAPID key from a different site — subscribes silently fail.
  • Not clearing the WordPress cache after saving — visitors keep seeing
    the old cached page without the script. You'll see it as admin (cache
    bypass for logged-in users) but the public won't.
  • Uploading sw.js to wp-content/ instead of public_html/ — must be at
    site root.

  PANEL DETAILS (don't change)
  ----------------------------
  Panel base URL: https://push.tradewithcandle.com
  Admin login:    https://push.tradewithcandle.com/dashboard
-->


<!-- ======= STYLES (top-center desktop, bottom-center mobile) ======= -->
<style>
#pp-card{position:fixed;z-index:99999;background:#fff;border-radius:16px;
 box-shadow:0 25px 60px rgba(0,0,0,.35);padding:18px 20px 16px;
 width:calc(100% - 32px);max-width:380px;display:none;
 font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#111;
 top:24px;left:50%;transform:translateX(-50%)}
@media (max-width:767px){#pp-card{top:auto;bottom:24px}}
#pp-card.show{display:block;animation:pp-down .35s cubic-bezier(.16,1,.3,1)}
@media (max-width:767px){#pp-card.show{animation-name:pp-up}}
@keyframes pp-down{from{opacity:0;transform:translate(-50%,-20px)}
 to{opacity:1;transform:translate(-50%,0)}}
@keyframes pp-up{from{opacity:0;transform:translate(-50%,20px)}
 to{opacity:1;transform:translate(-50%,0)}}

#pp-row{display:flex;gap:14px;align-items:flex-start;margin-bottom:14px}
#pp-icon{font-size:34px;line-height:1;flex-shrink:0}
#pp-text{flex:1;min-width:0}
#pp-text h4{margin:0 0 4px;font-size:15px;font-weight:600;color:#111}
#pp-text p{margin:0;font-size:13px;color:#6b7280;line-height:1.45}
#pp-btns{display:flex;gap:6px;justify-content:flex-end;align-items:center}
#pp-btns button{border:none;cursor:pointer;border-radius:8px;font:600 14px system-ui}
#pp-deny{background:transparent;color:#4b5563;padding:10px 14px}
#pp-deny:hover{color:#111;background:#f3f4f6}
#pp-allow{background:#2563eb;color:#fff;padding:11px 24px}
#pp-allow:hover{background:#1d4ed8}

#pp-bell{position:fixed;bottom:20px;right:20px;z-index:9998;background:#2563eb;color:#fff;
 border:none;border-radius:9999px;padding:12px 18px;font:600 14px system-ui;
 box-shadow:0 4px 14px rgba(0,0,0,.25);cursor:pointer;display:none}
</style>


<!-- ======= POPUP HTML ======= -->
<div id="pp-card">
  <div id="pp-row">
    <div id="pp-icon">🔔</div>
    <div id="pp-text">
      <h4 id="pp-title"></h4>
      <p>You can unsubscribe from notifications anytime.</p>
    </div>
  </div>
  <div id="pp-btns">
    <button id="pp-deny">Deny</button>
    <button id="pp-allow">Allow</button>
  </div>
</div>
<button id="pp-bell">🔔 Get notifications</button>


<!-- ======= LOGIC ======= -->
<script>
(function(){
  /* ============================================================
     !!!CHANGE!!! these two values for EACH website you install on
     ============================================================ */
  var SITE_NAME = "YourBrandHere";
  var VAPID     = "PASTE_THIS_SITES_VAPID_PUBLIC_KEY_HERE";
  /* ============================================================ */

  var API="https://push.tradewithcandle.com", SW="/sw.js", SNOOZE_DAYS=7;
  var card=document.getElementById('pp-card'), bell=document.getElementById('pp-bell');
  document.getElementById('pp-title').textContent=SITE_NAME+' wants to notify you about the latest updates';
  var reg=null, subscribed=false;
  function supported(){return ('serviceWorker' in navigator)&&('PushManager' in window)&&('Notification' in window);}
  function snoozed(){var t=localStorage.getItem('pp_snooze');return t&&Date.now()<parseInt(t,10);}
  function snooze(){localStorage.setItem('pp_snooze',String(Date.now()+SNOOZE_DAYS*864e5));}
  function key(s){var p='='.repeat((4-s.length%4)%4),b=(s+p).replace(/-/g,'+').replace(/_/g,'/'),r=atob(b),a=new Uint8Array(r.length);for(var i=0;i<r.length;i++)a[i]=r.charCodeAt(i);return a;}
  function showCard(){if(!subscribed)card.classList.add('show');}
  function hideCard(){card.classList.remove('show');}
  function showBell(){bell.style.display=subscribed?'none':'block';}
  if(!supported())return;
  navigator.serviceWorker.register(SW).then(function(r){reg=r;return r.pushManager.getSubscription();})
   .then(function(sub){
     subscribed=!!sub;
     if(subscribed)return;
     if(Notification.permission==='denied'){showBell();return;}
     if(!snoozed())setTimeout(showCard,1200); else showBell();
   }).catch(function(e){console.log('pp init',e);});
  function doSubscribe(){
    hideCard();
    Notification.requestPermission().then(function(p){
      if(p!=='granted'){showBell();return;}
      return reg.pushManager.getSubscription().then(function(s){
        return s||reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:key(VAPID)});
      }).then(function(sub){
        return fetch(API+'/api/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({subscription:sub.toJSON(),siteOrigin:location.origin,userAgent:navigator.userAgent})});
      }).then(function(res){if(res.ok){subscribed=true;showBell();}});
    }).catch(function(e){console.log('pp sub',e);showBell();});
  }
  document.getElementById('pp-allow').onclick=doSubscribe;
  document.getElementById('pp-deny').onclick=function(){hideCard();snooze();showBell();};
  bell.onclick=doSubscribe;
})();
</script>
